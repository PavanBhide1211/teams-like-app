services:
  postgres:
    image: postgres:16-alpine
    container_name: cowork-postgres
    environment:
      POSTGRES_USER: cowork
      POSTGRES_PASSWORD: cowork
      POSTGRES_DB: cowork
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "cowork"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cowork-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: cowork-backend
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      DATABASE_URL: postgres://cowork:cowork@postgres:5432/cowork
      REDIS_URL: redis://redis:6379
      JWT_SIGNING_KEY: "change-me-in-production-please-32-bytes-or-more"
      BIND_ADDRESS: "0.0.0.0:8000"
      RUST_LOG: "info,cowork=debug"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6

volumes:
  pg-data:
